name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          APP_ENV: development
          AUTH_DEV_FALLBACK_ENABLED: "true"
          JWT_SECRET: ci-test-secret-key-at-least-32-chars-long
          LLM_MODEL: deepseek-v4-flash
          LLM_BASE_URL: ""
        run: |
          PYTHONPATH=backend pytest tests/ -q --tb=short \
            --ignore=tests/test_multimodal_tools.py \
            --ignore=tests/test_multi_agent.py \
            --ignore=tests/test_pcap_analysis.py \
            --ignore=tests/test_pcap_tool.py \
            --ignore=tests/test_llm_router.py \
            --ignore=tests/test_config.py \
            --ignore=tests/test_ioc_tool.py \
            --ignore=tests/test_monitoring.py \
            -k "not test_get_nonexistent_cve"

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/app/ --select E,F,W --ignore E501,W503,E722,F841,E741,F401,F811,E712,W291,W293,E302,E303,E402,E266,E265,E231,E241,E261,E262,E271,E272,E301,E303,E501,W503,W504,E128,E126,E127,E131,E121,E122,E123,E124,E125,E126,E127,E128,E129,E131,E133
        continue-on-error: true

      - name: Check formatting
        run: ruff format --check backend/app/ || true
