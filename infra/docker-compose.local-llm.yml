# vLLM 本地模型推理服务
# 用法: docker compose -f docker-compose.local-llm.yml up -d
#
# 前置条件:
#   - NVIDIA GPU 可用 (默认使用 GPU 0,1)
#   - nvidia-container-toolkit 已安装
#   - 模型权重位于 ../model/Qwen3-14B-Instruct/

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: cybersec-vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - HUGGING_FACE_HUB_CACHE=/root/.cache/huggingface
    ports:
      - "8001:8001"
    volumes:
      - ../model:/app/model:ro
      - vllm_cache:/root/.cache
    command: >
      --model /app/model/Qwen3-14B-Instruct
      --tensor-parallel-size 2
      --max-model-len 16384
      --max-num-seqs 64
      --gpu-memory-utilization 0.90
      --port 8001
      --host 0.0.0.0
      --served-model-name qwen3-14b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  vllm_cache:
