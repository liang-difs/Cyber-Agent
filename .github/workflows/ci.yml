name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest

      - name: Run agent core tests
        env:
          APP_ENV: development
          AUTH_DEV_FALLBACK_ENABLED: "true"
          JWT_SECRET: ci-test-secret-key-at-least-32-chars-long
          LLM_MODEL: deepseek-v4-flash
          LLM_BASE_URL: ""
        run: |
          PYTHONPATH=backend pytest tests/test_react_agent.py tests/test_json_parser.py tests/test_context_compressor.py tests/test_loop_state.py tests/test_retry.py tests/test_tool_cache.py tests/test_decision_trace.py tests/test_constants.py tests/test_exceptions.py tests/test_security.py tests/test_sanitizer.py tests/test_tool_registry.py tests/test_cve_tool.py tests/test_ip_tool.py tests/test_rag.py tests/test_knowledge_graph.py tests/test_rule_engine.py tests/test_response_actions.py tests/test_report_generator.py -q --tb=short

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/app/ --select E,F,W --ignore E501,W503,E722,F841,E741,F401,F811,E712,W291,W293,E302,E303,E402
        continue-on-error: true

      - name: Check formatting
        run: ruff format --check backend/app/ || true
